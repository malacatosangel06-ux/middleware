openapi: "3.1.0"
info:
  title: UIDE Inscripciones API
  version: "2.0.0"
  license:
    name: MIT
    identifier: MIT

servers:
  - url: http://{host}:3000
    description: Desarrollo local
    variables:
      host:
        default: localhost

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Estado del servidor
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Servidor activo.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                additionalProperties: false
              example:
                status: "OK"
        '401':
          description: API key ausente o inválida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "API key ausente o inválida."

  /v1/inscripciones:
    post:
      operationId: crearInscripcionV1
      summary: Crear inscripción (contrato v1)
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InscripcionV1'
            example:
              estudianteId: "123e4567-e89b-12d3-a456-426614174000"
              materias: ["LTI_05A_458"]
              periodoid: "2026-1"
      responses:
        '201':
          description: Inscripción creada exitosamente en v1.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaExitosaV1'
              example:
                version: "v1"
                message:
                  estudianteId: "123e4567-e89b-12d3-a456-426614174000"
                  materias: ["LTI_05A_458"]
                  periodoid: "2026-1"
        '400':
          description: Payload inválido (faltan campos obligatorios).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "campos requeridos: estudianteId, materias, periodoid"
        '401':
          description: API key ausente o inválida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v2/inscripciones:
    post:
      operationId: crearInscripcionV2
      summary: Crear inscripción con método de pago (contrato v2)
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InscripcionV2'
            examples:
              peticionExitosa:
                summary: Petición Válida
                value:
                  estudianteId: "123e4567-e89b-12d3-a456-426614174000"
                  materias: ["LTI_05A_458"]
                  periodoId: "2026-1"
                  metodo_pago: "Debito"
              errorCampos:
                summary: Error por campos faltantes
                value:
                  estudianteId: "123e4567-e89b-12d3-a456-426614174000"
                  materias: []
                  periodoId: ""
                  metodo_pago: "Debito"
              errorEnum:
                summary: Error por método de pago inválido
                value:
                  estudianteId: "123e4567-e89b-12d3-a456-426614174000"
                  materias: ["LTI_05A_458"]
                  periodoId: "2026-1"
                  metodo_pago: "cash"
      responses:
        '201':
          description: Inscripción creada exitosamente en v2.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaExitosaV2'
              example:
                version: "v2"
                message:
                  estudianteId: "123e4567-e89b-12d3-a456-426614174000"
                  materias: ["LTI_05A_458"]
                  periodoId: "2026-1"
                  metodo_pago: "Debito"
        '400':
          description: Petición errónea debido a campos ausentes o método de pago no soportado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                errorCamposFaltantes:
                  summary: Respuesta para campos ausentes
                  value:
                    error: "Campos requeridos: estudianteId, materias, periodoId, metodo_pago"
                errorMetodoInvalido:
                  summary: Respuesta para método de pago inválido
                  value:
                    error: "El metodo de pago insertado debe ser: Efectivo, Transferencia, Debito o Credito"
        '401':
          description: API key ausente o inválida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    InscripcionV1:
      type: object
      required: [estudianteId, materias, periodoid]
      properties:
        estudianteId:
          type: string
          format: uuid
        materias:
          type: array
          items:
            type: string
          minItems: 1
        periodoid:
          type: string
      additionalProperties: false

    InscripcionV2:
      type: object
      required: [estudianteId, materias, periodoId, metodo_pago]
      properties:
        estudianteId:
          type: string
          format: uuid
        materias:
          type: array
          items:
            type: string
          minItems: 1
        periodoId:
          type: string
        metodo_pago:
          type: string
          enum: [Efectivo, Transferencia, Debito, Credito]
      additionalProperties: false

    RespuestaExitosaV1:
      type: object
      required: [version, message]
      properties:
        version:
          type: string
        message:
          type: object
          required: [estudianteId, materias, periodoid]
          properties:
            estudianteId:
              type: string
              format: uuid
            materias:
              type: array
              items:
                type: string
            periodoid:
              type: string

    RespuestaExitosaV2:
      type: object
      required: [version, message]
      properties:
        version:
          type: string
        message:
          type: object
          required: [estudianteId, materias, periodoId, metodo_pago]
          properties:
            estudianteId:
              type: string
              format: uuid
            materias:
              type: array
              items:
                type: string
            periodoId:
              type: string
            metodo_pago:
              type: string
              enum: [Efectivo, Transferencia, Debito, Credito]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
      additionalProperties: false