openapi: 3.0.3
info:
  title: API de Inscripciones y Middlewares
  description: API para la gestión de inscripciones de estudiantes con control de versiones y validaciones.
  version: 2.0.0
  license:
    name: ISC
    url: https://opensource.org/licenses/ISC
servers:
  - url: http://{entorno}:{puerto}
    description: Servidor de Desarrollo
    variables:
      entorno:
        default: localhost
      puerto:
        default: "3000"
paths:
  /health:
    get:
      summary: Verificar el estado del servidor
      description: Retorna el estado actual del backend y la hora del servidor.
      operationId: checkHealth
      security: [] # El endpoint de salud es público y no requiere API Key
      responses:
        '200':
          description: Servidor operativo.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  ts:
                    type: string
                    format: date-time
                    example: "2026-06-23T14:59:00.000Z"
        '401':
          description: No autorizado (agregado para cumplir estándar 4XX).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/inscripciones:
    post:
      summary: Crear una inscripción (Versión 1)
      description: Registra una inscripción con validaciones básicas de campos obligatorios.
      operationId: createInscripcionV1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - estudianteId
                - materias
                - periodoid
              properties:
                estudianteId:
                  type: string
                  example: "123e4567-e89b-12d3-a456-426614174000"
                materias:
                  type: array
                  items:
                    type: string
                  example: ["LTI_05A_458"]
                periodoid:
                  type: string
                  example: "2026-1"
      responses:
        '201':
          description: Inscripción creada exitosamente en V1.
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: v1
                  message:
                    type: object
                    properties:
                      estudianteId:
                        type: string
                      materias:
                        type: array
                        items:
                          type: string
                      periodoid:
                        type: string
        '400':
          description: Petición inválida por falta de campos obligatorios.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autorizado. API Key inválida o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v2/inscripciones:
    post:
      summary: Crear una inscripción (Versión 2)
      description: Registra una inscripción incluyendo el método de pago obligatorio y validado.
      operationId: createInscripcionV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - estudianteId
                - materias
                - periodoId
                - metodo_pago
              properties:
                estudianteId:
                  type: string
                  example: "uuid-123"
                materias:
                  type: array
                  items:
                    type: string
                  example: ["LTI_05A_458"]
                periodoId:
                  type: string
                  example: "2026-1"
                metodo_pago:
                  type: string
                  enum: [Efectivo, Transferencia, Debito, Credito]
                  example: "Efectivo"
      responses:
        '201':
          description: Inscripción creada exitosamente en V2.
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: v2
                  message:
                    type: object
                    properties:
                      estudianteId:
                        type: string
                      materias:
                        type: array
                        items:
                          type: string
                      periodoId:
                        type: string
                      metodo_pago:
                        type: string
        '400':
          description: Campos faltantes o método de pago no permitido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autorizado. API Key inválida o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Llave secreta requerida por el middleware de autenticación de la aplicación.
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Campos requeridos: estudianteId, materias, periodoId, metodo_pago"